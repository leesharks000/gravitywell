services:
  - type: web
    name: gravitywell
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gravitywell-db
          property: connectionString
      - key: ZENODO_TOKEN
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: API_BASE_URL
        value: https://gravitywell.onrender.com

databases:
  - name: gravitywell-db
    plan: free
    postgresMajorVersion: 15
